{% load static %}

<nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
    <div class="container-fluid py-1 px-3">
      <div class="d-flex align-items-center gap-3">
        <button type="button" class="sidebar-toggle-btn d-xl-none" id="mobileSidenavToggle" aria-label="Abrir menu lateral" aria-controls="sidenav-main" aria-expanded="false">
          <span class="sidenav-toggler-inner">
            <span class="sidenav-toggler-line"></span>
            <span class="sidenav-toggler-line"></span>
            <span class="sidenav-toggler-line"></span>
          </span>
        </button>

      <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
          <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript:;">Pages</a></li>
          <li class="breadcrumb-item text-sm text-dark active" aria-current="page">{{ segment|title }}</li>
        </ol>
      </nav>
      </div>
      <div class="collapse navbar-collapse mt-sm-0 mt-2 me-md-0 me-sm-4" id="navbar">
        <div class="ms-md-auto pe-md-3 d-flex align-items-center">
          
        </div>
        <ul class="navbar-nav d-flex align-items-center justify-content-end">

          

          <!-- User / Auth -->
          <li class="nav-item d-flex align-items-center">
            {% if request.user.is_authenticated %}
            <div class="dropdown">
              <a href="#" class="nav-link text-body font-weight-bold px-0 d-flex align-items-center gap-1"
                 id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="material-symbols-rounded">account_circle</i>
                <span class="d-none d-sm-inline text-sm">{{ request.user.username }}</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end px-2 py-2" aria-labelledby="userDropdown">
                <li>
                  <span class="dropdown-item-text text-xs text-secondary px-2">
                    Signed in as <strong>{{ request.user.username }}</strong>
                  </span>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <form method="post" action="{% url 'procurement:logout' %}">
                    {% csrf_token %}
                    <button type="submit"
                            class="dropdown-item border-radius-md text-danger d-flex align-items-center gap-2">
                      <i class="material-symbols-rounded" style="font-size:18px;">logout</i>
                      Logout
                    </button>
                  </form>
                </li>
              </ul>
            </div>
            {% else %}
            <a href="{% url 'login' %}" class="nav-link text-body font-weight-bold px-0 d-flex align-items-center gap-1">
              <i class="material-symbols-rounded">login</i>
              <span class="d-none d-sm-inline text-sm">Sign In</span>
            </a>
            {% endif %}
          </li>

        </ul>
      </div>
    </div>
</nav>

<style>
  .sidebar-toggle-btn {
    width: 42px;
    height: 42px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(15, 23, 42, 0.08);
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
  }

  .sidebar-toggle-btn .sidenav-toggler-inner {
    width: 18px;
  }

  .sidebar-toggle-btn .sidenav-toggler-line {
    display: block;
    width: 18px;
    height: 2px;
    background: #1f2937;
    border-radius: 999px;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .sidebar-toggle-btn .sidenav-toggler-line:not(:last-child) {
    margin-bottom: 4px;
  }

  body.g-sidenav-pinned .sidebar-toggle-btn .sidenav-toggler-line:first-child {
    transform: translateX(5px);
    width: 13px;
  }

  body.g-sidenav-pinned .sidebar-toggle-btn .sidenav-toggler-line:last-child {
    transform: translateX(5px);
    width: 13px;
  }

  .sidebar-toggle-btn:focus-visible {
    outline: 2px solid rgba(46, 62, 130, 0.35);
    outline-offset: 2px;
  }

  @media (max-width: 1199.98px) {
    #navbarBlur {
      position: sticky;
      top: 0;
      z-index: 1045;
      background: transparent;
    }

    #navbarBlur .container-fluid {
      gap: 0.75rem;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const mobileSidenavToggle = document.getElementById('mobileSidenavToggle');
    const sidenav = document.getElementById('sidenav-main');
    const closeIcon = document.getElementById('iconSidenav');
    const body = document.body;
    const mobileBreakpoint = 1200;

    if (!mobileSidenavToggle || !sidenav || !closeIcon) {
      return;
    }

    function isMobileViewport() {
      return window.innerWidth < mobileBreakpoint;
    }

    function isSidebarOpen() {
      return body.classList.contains('g-sidenav-pinned');
    }

    function syncSidebarState(open) {
      mobileSidenavToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      closeIcon.classList.toggle('d-none', !open || !isMobileViewport());
    }

    function setSidebarOpen(open) {
      if (!isMobileViewport()) {
        syncSidebarState(false);
        return;
      }

      body.classList.toggle('g-sidenav-pinned', open);
      syncSidebarState(open);
    }

    mobileSidenavToggle.addEventListener('click', function () {
      setSidebarOpen(!isSidebarOpen());
    });

    closeIcon.addEventListener('click', function () {
      setSidebarOpen(false);
    });

    document.addEventListener('click', function (event) {
      if (!isMobileViewport() || !isSidebarOpen()) {
        return;
      }

      if (sidenav.contains(event.target) || mobileSidenavToggle.contains(event.target)) {
        return;
      }

      setSidebarOpen(false);
    });

    window.addEventListener('resize', function () {
      if (!isMobileViewport()) {
        syncSidebarState(false);
      }
    });

    syncSidebarState(isSidebarOpen() && isMobileViewport());
  });
</script>
