{% load static %}

<nav class="navbar navbar-main navbar-expand-lg px-0 mx-3 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
    <div class="container-fluid py-1 px-3">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
          <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="javascript:;">Pages</a></li>
          <li class="breadcrumb-item text-sm text-dark active" aria-current="page">{{ segment|title }}</li>
        </ol>
      </nav>
      <div class="collapse navbar-collapse mt-sm-0 mt-2 me-md-0 me-sm-4" id="navbar">
        <div class="ms-md-auto pe-md-3 d-flex align-items-center">
          
        </div>
        <ul class="navbar-nav d-flex align-items-center justify-content-end">

          

          <!-- User / Auth -->
          <li class="nav-item d-flex align-items-center">
            {% if request.user.is_authenticated %}
            <div class="dropdown">
              <a href="#" class="nav-link text-body font-weight-bold px-0 d-flex align-items-center gap-1"
                 id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="material-symbols-rounded">account_circle</i>
                <span class="d-none d-sm-inline text-sm">{{ request.user.username }}</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end px-2 py-2" aria-labelledby="userDropdown">
                <li>
                  <span class="dropdown-item-text text-xs text-secondary px-2">
                    Signed in as <strong>{{ request.user.username }}</strong>
                  </span>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                  <form method="post" action="{% url 'procurement:logout' %}">
                    {% csrf_token %}
                    <button type="submit"
                            class="dropdown-item border-radius-md text-danger d-flex align-items-center gap-2">
                      <i class="material-symbols-rounded" style="font-size:18px;">logout</i>
                      Logout
                    </button>
                  </form>
                </li>
              </ul>
            </div>
            {% else %}
            <a href="{% url 'login' %}" class="nav-link text-body font-weight-bold px-0 d-flex align-items-center gap-1">
              <i class="material-symbols-rounded">login</i>
              <span class="d-none d-sm-inline text-sm">Sign In</span>
            </a>
            {% endif %}
          </li>

        </ul>
      </div>
    </div>
</nav>
